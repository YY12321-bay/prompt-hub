<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt 灵感库</title>
<style>
  /* ========== 全局重置 ========== */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --primary-dark: #4834d4;
    --accent: #fd79a8;
    --bg: #0f0f1a;
    --bg-card: #1a1a2e;
    --bg-card-hover: #222240;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --border: #2d2d4a;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
    --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ========== 滚动条 ========== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

  /* ========== 统计栏 ========== */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-number {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary-light);
  }
  .stat-label { font-size: 13px; color: var(--text-muted); }

  /* ========== 导航栏 ========== */
  .nav-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,26,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-brand {
    font-weight: 700;
    font-size: 18px;
    color: var(--primary-light);
    white-space: nowrap;
    margin-right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .nav-brand span { font-size: 22px; }
  .nav-tabs { display: flex; gap: 4px; padding: 12px 0; flex-wrap: nowrap; flex-shrink: 0; }
  .nav-search {
    margin-left: auto;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  .nav-search input {
    width: 200px;
    padding: 8px 14px 8px 34px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: var(--transition);
  }
  .nav-search input:focus {
    border-color: var(--primary);
    background: rgba(255,255,255,0.08);
    width: 240px;
  }
  .nav-search input::placeholder { color: var(--text-muted); }
  .nav-search .search-icon {
    position: absolute;
    margin-left: 10px;
    font-size: 14px;
    color: var(--text-muted);
    pointer-events: none;
  }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
    font-weight: 500;
  }
  .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-tab.active {
    color: #fff;
    background: var(--primary);
    box-shadow: 0 4px 15px rgba(108,92,231,0.3);
  }
  .nav-tab .tab-icon { margin-right: 6px; }

  /* ========== 主内容区 ========== */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .section-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .count {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
    background: var(--bg-card);
    padding: 2px 12px;
    border-radius: 20px;
  }

  /* ========== 提示词卡片网格 ========== */
  .prompt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .prompt-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: var(--transition);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .prompt-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary);
    box-shadow: var(--shadow);
    background: var(--bg-card-hover);
  }
  .prompt-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .prompt-card .card-category {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(108,92,231,0.15);
    color: var(--primary-light);
    font-weight: 500;
  }
  .prompt-card .card-id {
    font-size: 12px;
    color: var(--text-muted);
  }
  .prompt-card .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }
  .prompt-card .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .prompt-card .prompt-text {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 16px;
    flex: 1;
    position: relative;
    border-left: 3px solid var(--primary);
    word-break: break-word;
    max-height: 120px;
    overflow-y: auto;
  }
  .prompt-card .card-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-copy {
    background: var(--primary);
    color: #fff;
    flex: 1;
  }
  .btn-copy:hover { background: var(--primary-dark); transform: scale(1.02); }
  .btn-copy.copied { background: #00b894; }
  .btn-like {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    padding: 8px 12px;
    border: 1px solid var(--border);
  }
  .btn-like:hover { background: rgba(253,121,168,0.1); color: var(--accent); border-color: var(--accent); }
  .btn-like.liked { background: rgba(253,121,168,0.15); color: var(--accent); border-color: var(--accent); }

  .btn-delete {
    background: transparent;
    color: var(--text-muted);
    padding: 8px 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    border-radius: 8px;
    line-height: 1;
  }
  .btn-delete:hover { background: rgba(253,121,168,0.15); color: var(--accent); }

  /* ========== 封面图片 ========== */
  .prompt-cover {
    width: 100%;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--bg-card), var(--border));
    position: relative;
    cursor: pointer;
  }
  .prompt-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .prompt-card:hover .prompt-cover img { transform: scale(1.05); }
  .prompt-cover .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: var(--text-muted);
    opacity: 0.4;
  }
  .cover-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    color: #fff;
    display: none;
    pointer-events: none;
  }
  .prompt-cover.has-image .cover-badge { display: block; }

  /* ========== 图片上传区域 ========== */
  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    background: rgba(0,0,0,0.15);
  }
  .image-upload-area:hover { border-color: var(--primary); background: rgba(108,92,231,0.05); }
  .image-upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .image-upload-area .upload-text { font-size: 14px; color: var(--text-muted); }
  .image-upload-area .upload-hint { font-size: 12px; color: var(--text-muted); opacity: 0.6; margin-top: 4px; }
  .image-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .image-upload-area.has-image {
    border-color: var(--primary);
    border-style: solid;
    padding: 4px;
  }
  .image-upload-area .upload-preview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
    display: none;
  }
  .image-upload-area.has-image .upload-preview { display: block; }
  .image-upload-area.has-image .upload-icon,
  .image-upload-area.has-image .upload-text,
  .image-upload-area.has-image .upload-hint { display: none; }
  .upload-remove {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .image-upload-area.has-image .upload-remove { display: flex; }
  .upload-remove:hover { background: rgba(253,121,168,0.8); }

  /* ========== 全屏图片查看器 ========== */
  .img-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
    cursor: zoom-out;
  }
  .img-viewer.open { display: flex; }
  .img-viewer img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .img-viewer .viewer-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    font-size: 22px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-viewer .viewer-close:hover { background: rgba(253,121,168,0.6); }

  /* ========== 空状态 ========== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 14px;
    color: var(--text);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 999;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  /* ========== 新增模态框 ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .modal-header h2 { font-size: 22px; font-weight: 700; color: #fff; }
  .modal-close {
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }
  .form-group label .required { color: var(--accent); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    color: var(--text);
    font-size: 14px;
    transition: var(--transition);
    outline: none;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(108,92,231,0.1);
  }
  .form-group textarea { min-height: 120px; resize: vertical; }
  .form-group select { cursor: pointer; }
  .form-group select option { background: var(--bg-card); color: var(--text); }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.3); }

  .float-add {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(108,92,231,0.4);
    transition: var(--transition);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .float-add:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 12px 40px rgba(108,92,231,0.5); }

  /* ========== 响应式 ========== */
  @media (max-width: 768px) {
    .prompt-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 20px; }
    .nav-inner { gap: 4px; }
    .nav-tab { padding: 6px 12px; font-size: 13px; }
    .nav-search input { width: 120px; }
    .nav-search input:focus { width: 150px; }
    .modal { padding: 24px; }
    .float-add { bottom: 24px; right: 24px; width: 52px; height: 52px; font-size: 24px; }
  }
  @media (max-width: 480px) {
    .nav-brand span, .nav-brand { font-size: 14px; }
    .nav-tab { font-size: 12px; padding: 4px 10px; }
  }
</style>
</head>
<body>

<!-- ====== 统计栏 ====== -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-number" id="totalCount">0</div>
    <div class="stat-label">提示词总数</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="categoryCount">0</div>
    <div class="stat-label">分类数量</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="todayCount">0</div>
    <div class="stat-label">今日新增</div>
  </div>
</div>

<!-- ====== 导航栏 ====== -->
<div class="nav-wrapper">
  <div class="nav-inner">
    <div class="nav-brand"><span>⚡</span> PromptHub</div>
    <div class="nav-tabs" id="navTabs"></div>
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索提示词..." oninput="renderPrompts()">
    </div>
  </div>
</div>

<!-- ====== 主内容 ====== -->
<main class="main">
  <div class="section-title">
    <span id="currentCategory">📂 全部</span>
    <span class="count" id="displayCount">0 个</span>
  </div>
  <div class="prompt-grid" id="promptGrid"></div>
</main>

<!-- ====== 浮动添加按钮 ====== -->
<button class="float-add" onclick="openModal()" title="新增提示词">＋</button>

<!-- ====== 新增模态框 ====== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>📝 新增提示词</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="addPrompt(event)">
      <div class="form-group">
        <label>标题 <span class="required">*</span></label>
        <input type="text" id="newTitle" placeholder="例如：毛玻璃质感3D图标" required>
      </div>
      <div class="form-group">
        <label>提示词文案 <span class="required">*</span>
          <span style="font-weight:400;font-size:12px;color:var(--text-muted);margin-left:8px;cursor:pointer;" onclick="document.getElementById('importTxt').click()">📄 从 TXT 导入</span>
          <input type="file" id="importTxt" accept=".txt" style="display:none" onchange="importPromptTxt(event)">
        </label>
        <textarea id="newPrompt" placeholder="粘贴或输入你的提示词文案..." required></textarea>
      </div>
      <div class="form-group">
        <label>分类 <span class="required">*</span></label>
        <select id="newCategory" required></select>
      </div>
      <div class="form-group">
        <label>简短描述</label>
        <input type="text" id="newDesc" placeholder="一句话描述这个提示词的用途">
      </div>
      <div class="form-group">
        <label>封面图片</label>
        <div class="image-upload-area" id="uploadArea">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">点击选择封面图片</div>
          <div class="upload-hint">支持 JPG / PNG / WebP，单张 ≤ 5MB<br>可从 F:\公司文件\在线提示词图片库 选取</div>
          <img class="upload-preview" id="uploadPreview" alt="预览">
          <button type="button" class="upload-remove" onclick="removeCoverImage(event)">✕</button>
          <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
        </div>
      </div>
      <button type="submit" class="btn-submit">✨ 提交提示词</button>
    </form>
  </div>
</div>

<!-- ====== 设置弹窗 ====== -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal" style="max-width:520px;">
    <button class="modal-close" onclick="closeSettings()">&times;</button>
    <h2 style="margin-bottom:20px;">⚙️ 设置</h2>
    <div class="form-group">
      <label>GitHub Token（用于上传封面图片）</label>
      <input type="password" id="githubTokenInput" placeholder="输入你的 GitHub Personal Access Token"
             style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:14px;">
      <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">
        Token 仅存在你浏览器本地，不会上传到任何地方。<br>
        需要 <code>repo</code> 或 <code>contents:write</code> 权限。
        <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--primary-light);">去 GitHub 生成 →</a>
      </p>
    </div>
    <button class="btn-submit" onclick="saveSettings()" style="margin-top:8px;">💾 保存</button>
  </div>
</div>

<!-- ====== 全屏图片查看器 ====== -->
<div class="img-viewer" id="imgViewer" onclick="closeImageViewer(event)">
  <button class="viewer-close" onclick="closeImageViewer()">✕</button>
  <img id="viewerImg" src="" alt="封面大图">

// ============================================================
//  GitHub 图片上传（封面永久存储）
//  用户需在「设置」中填入 GitHub Token
// ============================================================
const GITHUB_CONFIG = {
  owner: 'YY12321-bay',
  repo: 'prompt-hub',
  branch: 'main',
  get token() { return localStorage.getItem('github_upload_token') || ''; },
  get rawUrl() { return `https://raw.githubusercontent.com/${this.owner}/${this.repo}/${this.branch}/images/`; }
};

/** Upload a file to GitHub images/ directory. Returns the raw URL. */
async function uploadImageToGitHub(file) {
  if (!GITHUB_CONFIG.token) throw new Error('请先在设置中配置 GitHub Token');

  const ext = file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/, '');
  const safeName = Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.' + (ext || 'png');
  const path = 'images/' + safeName;

  // Read file as base64
  const b64 = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('读取文件失败'));
    r.readAsDataURL(file);
  });

  // Upload via GitHub API
  const resp = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + GITHUB_CONFIG.token,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify({
      message: 'Upload cover: ' + safeName,
      content: b64,
      branch: GITHUB_CONFIG.branch
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('GitHub 上传失败: ' + (err.message || resp.status));
  }

  return GITHUB_CONFIG.rawUrl + safeName;
}

// ============================================================
//  数据源: localStorage || 默认
// ============================================================
const STORAGE_KEY = 'prompt_hub_data';
const DB_NAME = 'PromptHubDB';
const STORE_NAME = 'prompts';

// ------ IndexedDB 存储（容量大，适合存图片） ------
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function loadPrompts() {
  // 1) 优先 IndexedDB
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const data = await new Promise((res, rej) => {
      const r = store.get(STORAGE_KEY);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    db.close();
    if (data) return data;
  } catch (_) {}

  // 2) 后备 localStorage（迁移旧数据）
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      // 迁移到 IndexedDB 后删掉 localStorage
      savePrompts(data);
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      return data;
    }
  } catch (_) {}

  // 3) 默认数据
  return JSON.parse(JSON.stringify(DEFAULT_PROMPTS)).map(p => ({ ...p, coverImage: p.coverImage || '' }));
}

function savePrompts(data) {
  // 异步写入 IndexedDB，不阻塞 UI
  openDB().then(db => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.put(data, STORAGE_KEY);
    tx.oncomplete = () => db.close();
  }).catch(() => {
    // 极端 fallback：localStorage（可能因配额失败）
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (_) {}
  });
}

// ============================================================
//  状态（异步初始化）
// ============================================================
let prompts = [];
let currentCategory = 'all';
let nextId = 1;

(async function init() {
  prompts = await loadPrompts();
  nextId = prompts.length ? Math.max(...prompts.map(p => p.id)) + 1 : 1;
  renderNav();
  renderPrompts();
  updateStats();
})();

// ============================================================
//  渲染
// ============================================================
function renderNav() {
  const container = document.getElementById('navTabs');
  container.innerHTML = CATEGORIES.map(cat => `
    <button class="nav-tab ${cat.id === currentCategory ? 'active' : ''}"
            onclick="switchCategory('${cat.id}')">
      ${cat.icon} ${cat.label}
    </button>
  `).join('');
}

function renderPrompts() {
  const grid = document.getElementById('promptGrid');
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const catLabel = document.getElementById('currentCategory');

  const cat = CATEGORIES.find(c => c.id === currentCategory);
  catLabel.textContent = cat ? `${cat.icon} ${cat.label}` : '📂 全部';

  let filtered = prompts;
  if (currentCategory !== 'all') {
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  if (search) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(search) ||
      p.prompt.toLowerCase().includes(search) ||
      p.desc.toLowerCase().includes(search)
    );
  }

  document.getElementById('displayCount').textContent = `${filtered.length} 个`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <p>${search ? '没有匹配的提示词，换个关键词试试？' : '这个分类还没有提示词，点击右下角 ＋ 新增一个吧！'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const catLabel = CATEGORIES.find(c => c.id === p.category)?.label || p.category;
    const hasCover = !!p.coverImage;
    const coverHtml = hasCover
      ? `<img src="${escapeHtml(p.coverImage)}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.parentElement.classList.remove('has-image');this.remove()" onclick="event.stopPropagation();openImageViewer('${escapeHtml(p.coverImage)}')">`
      : `<div class="cover-placeholder">🖼️</div>`;
    return `
      <div class="prompt-card">
        <div class="prompt-cover ${hasCover ? 'has-image' : ''}" onclick="${hasCover ? `openImageViewer('${escapeHtml(p.coverImage)}')` : ''}">
          ${coverHtml}
          <span class="cover-badge">📷 封面</span>
        </div>
        <div class="card-header">
          <span class="card-category">${catLabel}</span>
          <span class="card-id">#${p.id}</span>
        </div>
        <div class="card-title">${escapeHtml(p.title)}</div>
        <div class="card-desc">${escapeHtml(p.desc || '')}</div>
        <div class="prompt-text">${escapeHtml(p.prompt)}</div>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyPrompt(${p.id}, this)">
            📋 复制
          </button>
          <button class="btn btn-like ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id}, this)">
            ${p.liked ? '❤️' : '🤍'} ${p.likes || 0}
          </button>
          <button class="btn-delete" onclick="deletePrompt(${p.id})" title="删除">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function switchCategory(catId) {
  currentCategory = catId;
  renderNav();
  renderPrompts();
}

// ============================================================
//  复制 & 点赞
// ============================================================
function copyPrompt(id, btn) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(p.prompt).then(() => {
      showCopied(btn);
    }).catch(() => {
      fallbackCopy(p.prompt, btn);
    });
  } else {
    fallbackCopy(p.prompt, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showCopied(btn);
  } catch (e) {}
  document.body.removeChild(ta);
}

function showCopied(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '✅ 已复制';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = orig;
    btn.classList.remove('copied');
  }, 1500);
}

function toggleLike(id, btn) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  p.liked = !p.liked;
  p.likes = (p.likes || 0) + (p.liked ? 1 : -1);
  savePrompts(prompts);
  renderPrompts();
}

// ============================================================
//  删除提示词
// ============================================================
function deletePrompt(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`确定要删除「${p.title}」吗？删除后不可恢复。`)) return;
  prompts = prompts.filter(x => x.id !== id);
  savePrompts(prompts);
  renderPrompts();
  updateStats();
  showToast('🗑️ 已删除');
}

// ============================================================
//  封面图片处理
// ============================================================
async function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showToast('图片大小不能超过 5MB');
    return;
  }

  // 显示本地预览（立即反馈）
  const reader = new FileReader();
  reader.onload = function(e) {
    const preview = document.getElementById('uploadPreview');
    preview.src = e.target.result;
  };
  reader.readAsDataURL(file);

  const area = document.getElementById('uploadArea');
  const uploadText = area.querySelector('.upload-text');
  const originalText = uploadText.textContent;
  uploadText.textContent = '⏳ 上传到 GitHub 中...';
  showToast('⏳ 正在上传封面到 GitHub...');

  try {
    const url = await uploadImageToGitHub(file);
    area.classList.add('has-image');
    area.dataset.githubUrl = url;
    uploadText.textContent = '✅ 已上传到 GitHub';
    showToast('✅ 封面已永久保存！');
  } catch (err) {
    showToast('❌ 上传失败: ' + err.message);
    uploadText.textContent = originalText;
    area.classList.remove('has-image');
    delete area.dataset.githubUrl;
    const preview = document.getElementById('uploadPreview');
    preview.src = '';
    console.error(err);
  }
}

function removeCoverImage(e) {
  if (e) e.stopPropagation();
  const area = document.getElementById('uploadArea');
  const preview = document.getElementById('uploadPreview');
  const input = document.getElementById('imageInput');
  preview.src = '';
  area.classList.remove('has-image');
  delete area.dataset.githubUrl;
  delete area.dataset.imageBase64;
  input.value = '';
  const uploadText = area.querySelector('.upload-text');
  if (uploadText) uploadText.textContent = '点击选择封面图片';
}

function importPromptTxt(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('newPrompt').value = e.target.result.trim();
    showToast('✅ 文案已导入 (' + file.name + ')');
  };
  reader.readAsText(file, 'UTF-8');
  event.target.value = '';
}

function openImageViewer(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('imgViewer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeImageViewer(e) {
  if (e && e.target !== e.currentTarget) return; // 只点在遮罩层或关闭按钮关闭
  document.getElementById('imgViewer').classList.remove('open');
  document.body.style.overflow = '';
}

// ============================================================
//  设置
// ============================================================
function openSettings() {
  const input = document.getElementById('githubTokenInput');
  const saved = localStorage.getItem('github_upload_token') || '';
  input.value = saved;
  document.getElementById('settingsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function saveSettings() {
  const input = document.getElementById('githubTokenInput');
  const token = input.value.trim();
  if (!token) {
    if (!confirm('留空会清除已保存的 Token，确定吗？')) return;
  }
  localStorage.setItem('github_upload_token', token);
  closeSettings();
  showToast(token ? '✅ Token 已保存' : '🗑️ Token 已清除');
}

// Auto-fill token from URL param ?token=xxx (方便后台辅助配置)
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (urlToken && urlToken.length > 10) {
    localStorage.setItem('github_upload_token', urlToken);
    if (window.history.replaceState) {
      const url = new URL(window.location);
      url.searchParams.delete('token');
      window.history.replaceState({}, '', url);
    }
  }
})();

// ESC 关闭查看器
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeImageViewer();
    closeModal();
  }
});

// ============================================================
//  统计
// ============================================================
function updateStats() {
  const cats = new Set(prompts.map(p => p.category));
  const today = new Date().toDateString();
  const todayCount = prompts.filter(p => {
    if (!p.createdAt) return false;
    return new Date(p.createdAt).toDateString() === today;
  }).length;

  document.getElementById('totalCount').textContent = prompts.length;
  document.getElementById('categoryCount').textContent = cats.size;
  document.getElementById('todayCount').textContent = todayCount;
}

// ============================================================
//  Toast
// ============================================================
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

// ============================================================
//  启动
// ============================================================
window.onerror = function(msg, url, line) {
  showToast('❌ 页面错误: ' + msg + ' (第' + line + '行)');
};
